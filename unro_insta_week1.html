<html lang="ko">
<head>
<meta charset="UTF-8">
<title>운로 인스타 카드 1주차</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; font-family:'Noto Sans KR',sans-serif; padding:32px 20px; }

.nav-day { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:16px; }
.nav-slide { display:flex; gap:6px; justify-content:center; margin-bottom:28px; }

.day-btn {
  padding:7px 16px; background:#222; color:#888; border:none;
  border-radius:20px; cursor:pointer; font-size:13px;
  font-family:'Noto Sans KR',sans-serif; transition:all .2s;
}
.day-btn:hover { background:#b8860b; color:#fff; }
.day-btn.active { background:#02204b; color:#d4a017; font-weight:700; }

.slide-btn {
  padding:5px 12px; background:#222; color:#666; border:none;
  border-radius:12px; cursor:pointer; font-size:12px;
  font-family:'Noto Sans KR',sans-serif; transition:all .2s;
}
.slide-btn:hover { background:#444; color:#fff; }
.slide-btn.active { background:#d4a017; color:#02204b; font-weight:700; }

.slide-wrap { display:none; justify-content:center; }
.slide-wrap.active { display:flex; }

/* 카드 1080x1080 */
.card {
  width: 800px;
  height: 800px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

/* ── 스타일A: 다크 훅 (1번 슬라이드) ── */
.dark {
  background: #02204b;
}
.dark .top-line {
  position:absolute; top:0; left:0; right:0; height:5px;
  background: linear-gradient(90deg, #d4a017, #b8860b, #d4a017);
}
.dark .inner {
  padding: 60px 60px 52px;
  height: 100%; display:flex; flex-direction:column;
}
.dark .slide-num {
  font-size:11px; letter-spacing:0.3em; color:rgba(212,160,23,0.6);
  margin-bottom:auto;
}
.dark .tag {
  font-size:13px; letter-spacing:0.2em; color:#d4a017;
  margin-bottom:20px; font-weight:500;
}
.dark .title {
  font-family:'Noto Serif KR',serif;
  font-size:52px; font-weight:900; color:#fff;
  line-height:1.25; letter-spacing:-1.5px;
  margin-bottom:28px;
}
.dark .title em { font-style:normal; color:#d4a017; }
.dark .hook {
  font-size:18px; color:rgba(255,255,255,0.6);
  line-height:1.75; border-left:3px solid #d4a017;
  padding-left:18px;
}
.dark .footer {
  display:flex; justify-content:space-between; align-items:center;
  margin-top:40px; padding-top:20px;
  border-top:1px solid rgba(255,255,255,0.1);
}
.dark .logo { display:flex; align-items:center; gap:8px; }
.dark .logo-box {
  width:30px; height:30px; background:#d4a017; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Noto Serif KR',serif; font-size:15px; font-weight:700; color:#02204b;
}
.dark .logo-text { font-family:'Noto Serif KR',serif; font-size:15px; font-weight:700; color:#d4a017; }
.dark .url { font-size:12px; color:rgba(255,255,255,0.25); letter-spacing:0.1em; }
.dark .bg-char {
  position:absolute; right:-20px; bottom:-40px;
  font-family:'Noto Serif KR',serif; font-size:300px; font-weight:900;
  color:rgba(255,255,255,0.03); line-height:1; user-select:none;
}
.dark .page-dot {
  position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
  display:flex; gap:6px;
}
.dark .dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.2); }
.dark .dot.on { background:#d4a017; width:20px; border-radius:3px; }

/* ── 스타일B: 베이지 본문 (2번 슬라이드) ── */
.beige {
  background: #f5f0e8;
}
.beige .left-bar {
  position:absolute; left:0; top:0; bottom:0; width:5px;
  background: linear-gradient(180deg, #02204b, #d4a017);
}
.beige .inner {
  padding: 56px 56px 52px 68px;
  height: 100%; display:flex; flex-direction:column;
}
.beige .tag {
  font-size:11px; letter-spacing:0.25em; color:#b8860b;
  margin-bottom:18px; font-weight:600;
}
.beige .title {
  font-family:'Noto Serif KR',serif;
  font-size:34px; font-weight:900; color:#02204b;
  line-height:1.35; margin-bottom:24px; letter-spacing:-0.5px;
}
.beige .divider {
  height:1px; background:linear-gradient(90deg,#b8860b,transparent);
  margin-bottom:28px;
}
.beige .body {
  font-size:19px; color:#3d2f24; line-height:1.95;
  font-weight:400; flex:1;
}
.beige .body strong { color:#02204b; font-weight:700; }
.beige .footer {
  display:flex; justify-content:space-between; align-items:center;
  padding-top:20px; border-top:1px solid rgba(26,20,16,0.1);
}
.beige .logo { display:flex; align-items:center; gap:8px; }
.beige .logo-box {
  width:28px; height:28px; background:#02204b; border-radius:5px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Noto Serif KR',serif; font-size:14px; font-weight:700; color:#d4a017;
}
.beige .logo-text { font-family:'Noto Serif KR',serif; font-size:14px; font-weight:700; color:#02204b; }
.beige .url { font-size:11px; color:#b8a898; letter-spacing:0.08em; }
.beige .page-dot {
  position:absolute; bottom:24px; left:50%; transform:translateX(-50%);

}
.beige .dot { width:6px; height:6px; border-radius:50%; background:rgba(2,32,75,0.15); }
.beige .dot.on { background:#02204b; width:20px; border-radius:3px; }

/* ── 스타일C: 흰 포인트 (3번 슬라이드) ── */
.white-card {
  background: #fff;
  border: 1px solid #e8e0d0;
}
.white-card .top-accent {
  position:absolute; top:0; left:0; right:0; height:6px;

}
.white-card .inner {

}
.white-card .tag {
  font-size:11px; letter-spacing:0.25em; color:#b8860b;
  margin-bottom:18px; font-weight:600;
}
.white-card .title {
  font-family:'Noto Serif KR',serif;
  font-size:30px; font-weight:900; color:#1a1410;
  line-height:1.35; margin-bottom:28px; letter-spacing:-0.5px;
}
.white-card .points { flex:1; display:flex; flex-direction:column; gap:16px; }
.white-card .point {
  display:flex; gap:16px; align-items:flex-start;

.white-card .point-icon {

}
.white-card .point-title {

}
.white-card .point-desc {
  font-size:15px; color:#666; line-height:1.65;
}
.white-card .footer {
  display:flex; justify-content:space-between; align-items:center;
  padding-top:20px; border-top:1px solid #f0e8d8; margin-top:20px;

.white-card .logo { display:flex; align-items:center; gap:8px; }
.white-card .logo-box {
  width:28px; height:28px; background:#02204b; border-radius:5px;

.white-card .logo-text { font-family:'Noto Serif KR',serif; font-size:14px; font-weight:700; color:#02204b; }
.white-card .url { font-size:11px; color:#b8a898; letter-spacing:0.08em; }
.white-card .page-dot {
  position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
  display:flex; gap:6px;
}
.white-card .dot { width:6px; height:6px; border-radius:50%; background:rgba(2,32,75,0.12); }
.white-card .dot.on { background:#02204b; width:20px; border-radius:3px; }

/* ── 스타일D: CTA (마지막 슬라이드) ── */
.cta-card {
  background: #02204b;
}
.cta-card::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse at 30% 30%, rgba(212,160,23,0.15) 0%, transparent 60%);
}
.cta-card .inner {
  padding: 64px 60px;
  height: 100%; display:flex; flex-direction:column;
  align-items:center; justify-content:center; text-align:center;
  position:relative; z-index:1;
}
.cta-card .ornament {
  display:flex; align-items:center; gap:16px; margin-bottom:40px; width:100%;

.cta-card .ornament-line { flex:1; height:1px; background:rgba(212,160,23,0.3); }
.cta-card .ornament-char {
  font-family:'Noto Serif KR',serif; font-size:32px; font-weight:900; color:#d4a017;
}
.cta-card .main-msg {
  font-family:'Noto Serif KR',serif;
  font-size:34px; font-weight:900; color:#fff;
  line-height:1.45; margin-bottom:20px; letter-spacing:-0.5px;
}
.cta-card .main-msg em { font-style:normal; color:#d4a017; }
.cta-card .sub-msg {
  font-size:17px; color:rgba(255,255,255,0.6);
  line-height:1.8; margin-bottom:48px;
}
.cta-card .btn {
  background:#d4a017; color:#02204b; border:none;
  border-radius:50px; padding:18px 48px;
  font-family:'Noto Serif KR',serif; font-size:18px; font-weight:900;
  letter-spacing:0.5px; cursor:default;
}
.cta-card .url-text {
  margin-top:20px; font-size:13px; color:rgba(255,255,255,0.3);
  letter-spacing:0.1em;
}
</style>
</head>

let currentDay = 0;
let currentSlide = 0;

function dots(total, current, style) {
  const cls = style === 'dark' || style === 'cta' ? 'white' : 'dark';
  return Array.from({length:total}, (_,i) =>
    `<div class="dot${i===current?' on':''}" style="${cls==='white'?'background:'+(i===current?'#d4a017':'rgba(255,255,255,0.2)'):''}"></div>`
  ).join('');
}

function renderSlide(s) {
  if (s.type === 'dark') {
    return `<div class="card dark">
      <div class="top-line"></div>
      <div class="bg-char">${days[currentDay].char}</div>
      <div class="inner">
        <div class="slide-num">운로 · UNRO</div>
        <div>
          <div class="tag">${s.tag}</div>
          <div class="title">${s.title.replace(/\n/g,'<br>')}</div>
          <div class="hook">${s.hook.replace(/\n/g,'<br>')}</div>
        </div>
        <div class="footer">
          <div class="logo">
            <div class="logo-box">運</div>
            <div class="logo-text">운로</div>
          </div>
          <div class="url">www.unro.co.kr</div>
        </div>
      </div>
      <div class="page-dot">${dots(s.dots, s.current, 'dark')}</div>
    </div>`;
  }
  if (s.type === 'beige') {
    return `<div class="card beige">
      <div class="left-bar"></div>
      <div class="inner">
        <div class="tag">${s.tag}</div>
        <div class="title">${s.title.replace(/\n/g,'<br>')}</div>
        <div class="divider"></div>
        <div class="body">${s.body.replace(/\n/g,'<br>')}</div>
        <div class="footer">
          <div class="logo">
            <div class="logo-box">運</div>
            <div class="logo-text">운로</div>
          </div>
          <div class="url">www.unro.co.kr</div>
        </div>
      </div>
      <div class="page-dot">${dots(s.dots, s.current, 'beige')}</div>
    </div>`;
  }
  if (s.type === 'white') {
    const pts = s.points.map(p=>`
      <div class="point">
        <div class="point-icon">${p.icon}</div>
        <div>
          <div class="point-title">${p.title}</div>
          <div class="point-desc">${p.desc}</div>
        </div>
      </div>`).join('');
    return `<div class="card white-card">
      <div class="top-accent"></div>
      <div class="inner">
        <div class="tag">${s.tag}</div>
        <div class="title">${s.title.replace(/\n/g,'<br>')}</div>
        <div class="points">${pts}</div>
        <div class="footer">
          <div class="logo">
            <div class="logo-box">運</div>
            <div class="logo-text">운로</div>
          </div>
          <div class="url">www.unro.co.kr</div>
        </div>
      </div>
      <div class="page-dot">${dots(s.dots, s.current, 'white')}</div>
    </div>`;
  }
  if (s.type === 'cta') {
    return `<div class="card cta-card">
      <div class="inner">
        <div class="ornament">
          <div class="ornament-line"></div>
          <div class="ornament-char">${s.char}</div>
          <div class="ornament-line"></div>
        </div>
        <div class="main-msg">${s.msg.replace(/\n/g,'<br>')}</div>
        <div class="sub-msg">${s.sub.replace(/\n/g,'<br>')}</div>
        <div class="btn">${s.btn}</div>
        <div class="url-text">www.unro.co.kr</div>
      </div>
    </div>`;
  }
}

function render() {
  const d = days[currentDay];
  const s = d.slides[currentSlide];

  // 슬라이드 nav
  const slideNav = document.getElementById('nav-slide');
  slideNav.innerHTML = d.slides.map((sl, i) =>
    `<button class="slide-btn${i===currentSlide?' active':''}" onclick="goSlide(${i})">${i+1}장</button>`
  ).join('');

  document.getElementById('container').innerHTML =
    `<div class="slide-wrap active">${renderSlide(s)}</div>`;
}

function goSlide(i) {
  currentSlide = i;
  render();
}

// Day nav
const dayNav = document.getElementById('nav-day');
days.forEach((d, i) => {
  const btn = document.createElement('button');
  btn.className = 'day-btn' + (i===0?' active':'');
  btn.textContent = `Day ${d.day}`;
  btn.onclick = () => {
    currentDay = i;
    currentSlide = 0;
    document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
  dayNav.appendChild(btn);
});

render();
</script>
